    FilterCounted:
      type: object
      title: FilterCounted
      properties:
        count:
          type: integer
          format: uint64
          description: |-
            Number of telemetry events to retrieve.

            This will correspond to the events fetched from the database
            PRECEDING ALL OTHER FILTERING. In other words, you are NOT
            guaranteed to receive `count` events in the response, as the
            filtering is done after fetching.

            You will not recieve an empty response unless there are no events
            matching your filters.

            Maximum: 100
          default: 30
        skip:
          type: integer
          format: uint64
          description: |-
            Number of telemetry events to skip. Will be sorted by timestamp
            descending.

            Default: 0
          default: 0
    FilterDateRange:
      type: object
      title: FilterDateRange
      required:
        - after
      properties:
        after:
          type: string
          format: date-time
          description: Start time for telemetry events
        before:
          type: string
          format: date-time
          description: |-
            End time for telemetry events

            Default: now
          default: 2026-02-25T20:57:29.400889442+00:00
