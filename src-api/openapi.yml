          description: Type of telemetry event to retrieve
          default: null
          nullable: true
          allOf:
          - $ref: '#/components/schemas/EventTypeFilter'
          - description: Type of telemetry event to retrieve
            default: null
            nullable: true
        after:
          type: string
          format: date-time
          description: Start time for telemetry events
          default: null
          nullable: true
        before:
          type: string
          format: date-time
          description: End time for telemetry events
          default: null
          nullable: true
    TelemetryQueryRequest:
      type: object
      title: TelemetryQueryRequest
      required:
      - count
      - skip
      - filters
      properties:
        count:
          type: integer
          format: uint64
          description: |-
            Number of telemetry events to retrieve.

            This will correspond to the events fetched from the database PRECEDING
            ALL OTHER FILTERING. In other words are NOT guaranteed to receive
            `count` events in the response, as the filtering is done after fetching.

            You will not recieve an empty response unless there are no events
            matching your filters.

            Default: 10
            Maximum: 100
          default: 10
        skip:
          type: integer
          format: uint64
          description: |-
            Number of telemetry events to skip. Will be sorted by timestamp
            descending.

            Default: 0
          default: 0
        filters:
          description: |-
            Filters to apply to the telemetry events.

            All filters are applied after the initial `count` and `skip` are
            applied to the database query.
          default:
            after: null
            before: null
            event_type: null
          allOf:
          - $ref: '#/components/schemas/TelemetryFilter'
          - description: |-
              Filters to apply to the telemetry events.

              All filters are applied after the initial `count` and `skip` are
              applied to the database query.
            default:
              after: null
              before: null
              event_type: null
    TelemetryResponse:
      type: object
      title: TelemetryResponse
      required:
      - events
      properties:
        events:
          type: array
