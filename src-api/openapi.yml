components:
  schemas:
    Admin:
      type: object
      title: Admin
      required:
        - id
        - sid_hashed
        - username
      properties:
        id:
          type: string
        sid_hashed:
          type: string
          nullable: true
        username:
          type: string
    AdminDelete:
      type: object
      title: AdminDelete
      required:
        - admin_id
        - target
      properties:
        admin_id:
          type: string
        target:
          $ref: "#/components/schemas/Admin"
    AdminDeleteRequest:
      type: object
      title: AdminDeleteRequest
      required:
        - admin_id
      properties:
        admin_id:
          type: string
    AdminEdit:
      type: object
      title: AdminEdit
      required:
        - admin_id
        - old
        - id
      properties:
        admin_id:
          type: string
          description: Corresponds to the admin who performed the edit
        old:
          $ref: "#/components/schemas/Admin"
        id:
          type: string
        sid_hashed:
          type: string
          nullable: true
        username:
          type: string
    AdminIdFilter:
      type: object
      title: AdminIdFilter
      required:
        - admin_id
      properties:
        admin_id:
          type: array
          description: |-
            List of admin IDs to filter by

            This will correspond to the admin who performed or otherwise authorized
            or triggered the event.

            This will NOT correspond to the admin that was acted upon, if any,
            unless, of course, it is the same as the acting admin.
          items:
            type: string
    AdminLogin:
      type: object
      title: AdminLogin
      required:
        - id
      properties:
        id:
          type: string
    AdminOperationFilter:
      type: object
      title: AdminOperationFilter
      required:
        - admin_id
        - target_id
      properties:
        admin_id:
          type: array
          description: Corresponds to the admin who performed the operation
          items:
            type: string
        target_id:
          type: array
          description: Corresponds to the admin acted upon.
          items:
            type: string
    AdminQueryManyResponse:
      type: object
      title: AdminQueryManyResponse
      required:
        - admins
      properties:
        admins:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Admin"
    Claims:
      type: object
      title: Claims
      required:
        - sub
        - exp
        - perms
        - k1e
        - username
      properties:
        sub:
          type: string
        exp:
          type: integer
          format: int64
        perms:
          $ref: "#/components/schemas/Permissions"
        k1e:
          type: string
        username:
          type: string
    Deletion_Admin:
      type: object
      title: Deletion_Admin
      required:
        - pkey
      properties:
        pkey:
          type: string
    Deletion_Record:
      type: object
      title: Deletion_Record
      required:
        - pkey
      properties:
        pkey:
          type: string
    Deletion_Student:
      type: object
      title: Deletion_Student
      required:
        - pkey
      properties:
        pkey:
          type: string
    Event:
      type: object
      anyOf:
        - $ref: "#/components/schemas/Event_AdminLogin"
        - $ref: "#/components/schemas/Event_AdminDelete"
        - $ref: "#/components/schemas/Event_AdminEdit"
        - $ref: "#/components/schemas/Event_PermissionEdit"
        - $ref: "#/components/schemas/Event_InviteAdd"
        - $ref: "#/components/schemas/Event_InviteUse"
        - $ref: "#/components/schemas/Event_StudentAdd"
        - $ref: "#/components/schemas/Event_StudentDelete"
        - $ref: "#/components/schemas/Event_StudentEdit"
        - $ref: "#/components/schemas/Event_RecordAdd"
        - $ref: "#/components/schemas/Event_RecordDelete"
        - $ref: "#/components/schemas/Event_RecordEdit"
        - $ref: "#/components/schemas/Event_StudentLogin"
        - $ref: "#/components/schemas/Event_StudentLogout"
      discriminator:
        propertyName: event
        mapping:
          admin_login: "#/components/schemas/Event_AdminLogin"
          admin_delete: "#/components/schemas/Event_AdminDelete"
          admin_edit: "#/components/schemas/Event_AdminEdit"
          permission_edit: "#/components/schemas/Event_PermissionEdit"
          invite_add: "#/components/schemas/Event_InviteAdd"
          invite_use: "#/components/schemas/Event_InviteUse"
          student_add: "#/components/schemas/Event_StudentAdd"
          student_delete: "#/components/schemas/Event_StudentDelete"
          student_edit: "#/components/schemas/Event_StudentEdit"
          record_add: "#/components/schemas/Event_RecordAdd"
          record_delete: "#/components/schemas/Event_RecordDelete"
          record_edit: "#/components/schemas/Event_RecordEdit"
          student_login: "#/components/schemas/Event_StudentLogin"
          student_logout: "#/components/schemas/Event_StudentLogout"
